apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-ui
  namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: demo-ui-cluster-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/portforward"]
  verbs: ["create"]
- apiGroups: ["ate.dev"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: demo-ui-cluster-rb
subjects:
- kind: ServiceAccount
  name: demo-ui
  namespace: openclaw
roleRef:
  kind: ClusterRole
  name: demo-ui-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-ui
  template:
    metadata:
      labels:
        app: demo-ui
    spec:
      serviceAccountName: demo-ui
      containers:
      - name: ui
        image: gcr.io/<YOUR_GCP_PROJECT_ID>/substrate-actor:latest
        imagePullPolicy: Always
        command: ["node", "dist/demo-ui.js"]
        ports:
        - containerPort: 8090
        env:
        - name: PORT
          value: "8090"
        - name: DEMO_NAMESPACE
          value: "openclaw"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-ui
  namespace: openclaw
spec:
  selector:
    app: demo-ui
  ports:
  - port: 80
    targetPort: 8090
  type: LoadBalancer
