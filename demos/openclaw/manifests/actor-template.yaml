apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: openclaw-agent
  namespace: openclaw
spec:
  runsc:
    amd64:
      url: "gs://gvisor/releases/nightly/2026-05-19/x86_64/runsc"
      sha256Hash: "a397be1abc2420d26bce6c70e6e2ff96c73aaaab929756c56f5e2089ea842b63"
    arm64:
      url: "gs://gvisor/releases/nightly/2026-05-19/aarch64/runsc"
      sha256Hash: "1ba2366ae2efceba166046f51a4104f9261c9cb72c6db8f5b3fe2dc57dea86b9"
  pauseImage: "registry.k8s.io/pause:3.10.2"
  containers:
  - name: agent
    image: gcr.io/<YOUR_GCP_PROJECT_ID>/substrate-actor:latest
    command: ["/usr/bin/tini", "--", "/usr/local/bin/node", "/app/dist/agent.js"]

    ports:
    - containerPort: 8080
    env:
    - name: OPENCLAW_SANDBOX_BACKEND
      value: "native"
  workerPoolRef:
    name: agent-pool
    namespace: openclaw
  snapshotsConfig:
    location: gs://<YOUR_GCS_BUCKET_NAME>/openclaw-agent/
