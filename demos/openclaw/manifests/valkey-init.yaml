apiVersion: batch/v1
kind: Job
metadata:
  name: valkey-cluster-init
  namespace: ate-system
spec:
  template:
    metadata:
      labels:
        app: valkey-cluster-init
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for all Valkey pods to resolve..."
          for i in 0 1 2 3 4 5; do
            until getent hosts valkey-cluster-${i}.valkey-cluster-service.ate-system.svc >/dev/null 2>&1; do
              echo "Waiting for valkey-cluster-${i} DNS..."
              sleep 2
            done
          done

          echo "All pods resolved. Getting IPs..."
          POD_IPS=""
          for i in 0 1 2 3 4 5; do
            ip=$(getent hosts valkey-cluster-${i}.valkey-cluster-service.ate-system.svc | awk '{print $1}')
            POD_IPS="${POD_IPS} ${ip}:6379"
          done

          echo "Checking if Valkey cluster is already initialized..."
          until valkey-cli --tls --cacert /etc/valkey-ca/ca.crt --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem --key /run/servicedns.podcert.ate.dev/credential-bundle.pem -h valkey-cluster-0.valkey-cluster-service.ate-system.svc ping >/dev/null 2>&1; do
            echo "Waiting for valkey-cluster-0 to respond to ping..."
            sleep 2
          done

          INIT_STATUS=$(valkey-cli --tls --cacert /etc/valkey-ca/ca.crt --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem --key /run/servicedns.podcert.ate.dev/credential-bundle.pem -h valkey-cluster-0.valkey-cluster-service.ate-system.svc cluster info 2>/dev/null | grep cluster_state || true)

          if [ -z "${INIT_STATUS}" ] || ! echo "${INIT_STATUS}" | grep -q "cluster_state:ok"; then
            echo "Initializing Valkey cluster..."
            valkey-cli --tls \
              --cacert /etc/valkey-ca/ca.crt \
              --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem \
              --key /run/servicedns.podcert.ate.dev/credential-bundle.pem \
              --cluster create ${POD_IPS} \
              --cluster-replicas 1 \
              --cluster-yes
            echo "Cluster initialization complete!"
          else
            echo "Cluster already initialized."
          fi
        image: valkey/valkey:8.0
        name: init
        volumeMounts:
        - mountPath: /run/servicedns.podcert.ate.dev
          name: servicedns
        - mountPath: /etc/valkey-ca
          name: valkey-ca-certs
          readOnly: true
      restartPolicy: OnFailure
      volumes:
      - name: servicedns
        projected:
          sources:
          - podCertificate:
              credentialBundlePath: credential-bundle.pem
              keyType: ECDSAP256
              signerName: servicedns.podcert.ate.dev/identity
      - name: valkey-ca-certs
        projected:
          sources:
          - secret:
              items:
              - key: ca.crt
                path: ca.crt
              name: valkey-ca-certs
