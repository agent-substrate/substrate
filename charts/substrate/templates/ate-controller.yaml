apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "substrate.fullname" (list "ate-controller" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    apps: ate-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "substrate.fullname" (list "ate-controller" .) }}
subjects:
- kind: ServiceAccount
  name: {{ include "substrate.fullname" (list "ate-controller" .) }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "substrate.fullname" (list "ate-controller" .) }}
  apiGroup: rbac.authorization.k8s.io
---
kind: Service
apiVersion: v1
metadata:
  name: {{ include "substrate.fullname" (list "ate-controller" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: ate-controller
spec:
  selector:
    app: ate-controller
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
    protocol: TCP
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ include "substrate.fullname" (list "ate-controller" .) }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ate-controller
  template:
    metadata:
      labels:
        app: ate-controller
    spec:
      serviceAccountName: {{ include "substrate.fullname" (list "ate-controller" .) }}
      containers:
      - name: ate-controller
        image: {{ .Values.images.atecontroller }}
{{- if eq .Values.auth.mode "jwt" }}
        args:
        - "--ateapi-auth=jwt"
        - "--ateapi-ca-file=/run/ateapi-ca/ca.crt"
        - "--ateapi-server-name={{ include "substrate.fullname" (list "api" .) }}.{{ .Release.Namespace }}.svc"
        - "--ateapi-token-file=/var/run/secrets/tokens/ateapi/token"
{{- end }}
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: healthz
          containerPort: 8081
          protocol: TCP
{{- if eq .Values.auth.mode "jwt" }}
        volumeMounts:
        - { name: ateapi-ca,    mountPath: /run/ateapi-ca, readOnly: true }
        - { name: ateapi-token, mountPath: /var/run/secrets/tokens/ateapi, readOnly: true }
      volumes:
      - name: ateapi-ca
        configMap:
          name: {{ .Values.auth.jwt.caBundleConfigMap }}
      - name: ateapi-token
        projected:
          sources:
          - serviceAccountToken:
              audience: {{ .Values.auth.jwt.audience }}
              expirationSeconds: 3600
              path: token
{{- end }}
