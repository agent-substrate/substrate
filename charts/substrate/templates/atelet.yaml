# atelet — identical across auth modes (does not dial ateapi).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "substrate.fullname" (list "atelet" .) }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "substrate.fullname" (list "atelet-role" .) }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "substrate.fullname" (list "atelet-binding" .) }}
subjects:
- kind: ServiceAccount
  name: {{ include "substrate.fullname" (list "atelet" .) }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "substrate.fullname" (list "atelet-role" .) }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "substrate.fullname" (list "atelet" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: atelet
spec:
  selector:
    matchLabels:
      app: atelet
  template:
    metadata:
      labels:
        app: atelet
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: {{ include "substrate.fullname" (list "atelet" .) }}
      containers:
      - name: atelet
        image: {{ .Values.images.atelet }}
        args:
        - --gcp-auth-for-image-pulls={{ .Values.atelet.gcpAuthForImagePulls }}
{{- with .Values.atelet.extraArgs }}
{{ toYaml . | indent 8 }}
{{- end }}
        securityContext:
          privileged: true
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.otel.endpoint }}
        - name: ATE_STORAGE_BACKEND
          value: {{ .Values.atelet.storageBackend | quote }}
{{- with .Values.atelet.extraEnv }}
{{ toYaml . | indent 8 }}
{{- end }}
        ports:
        - name: grpc
          containerPort: 8085
          hostPort: 8085
        - name: prometheus
          containerPort: 9090
          hostPort: 9090
          protocol: TCP
        volumeMounts:
        - name: run-ateom
          mountPath: /run/ateom-gvisor
      volumes:
      - name: run-ateom
        hostPath:
          path: /run/ateom-gvisor
          type: DirectoryOrCreate
